  t(key) {
    const entry = this.dict[key];
    if (!entry) return key;
    return entry[this.current] || entry['en'] || key;
  },
  apply() {
    document.documentElement.lang = this.current;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      const text = this.t(k);
      if (text) el.textContent = text;
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const k = el.getAttribute('data-i18n-html');
      const text = this.t(k);
      if (text) el.innerHTML = text;
    });
    const titleEl = document.querySelector('title');
    const titleKey = document.documentElement.getAttribute('data-page-title');
    if (titleKey && titleEl) titleEl.textContent = this.t(titleKey);
    this.updateThemeButtons();
    this.updateLangLabel();
  },
  updateThemeButtons() {
    const btn = document.getElementById('btn-theme');
    const abtn = document.getElementById('btn-accent');
    const theme = document.documentElement.getAttribute('data-theme') || 'dark';
    const accent = document.documentElement.getAttribute('data-accent') || 'cyan';
    if (btn) {
      btn.textContent = theme === 'dark' ? '🌙' : '☀️';
      btn.title = this.t(theme === 'dark' ? 'theme.dark_hint' : 'theme.light_hint');
    }
    if (abtn) {
      abtn.textContent = accent === 'cyan' ? '🩵' : '💗';
      abtn.title = this.t(accent === 'cyan' ? 'accent.cyan_hint' : 'accent.magenta_hint');
    }
  },
  updateLangLabel() {
    const sel = document.getElementById('lang-select');
    if (sel) sel.value = this.current;
  },
  setLang(code) {
    this.current = code;
    localStorage.setItem('imgshift-lang', code);
    this.apply();
  },
  init() {
    const saved = localStorage.getItem('imgshift-lang');
    if (saved && this.supported.some(s => s.code === saved)) this.current = saved;
    this.apply();
  }
};

(function initTheme() {
  const savedTheme = localStorage.getItem('imgshift-theme') || 'dark';
  const savedAccent = localStorage.getItem('imgshift-accent') || 'cyan';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.documentElement.setAttribute('data-accent', savedAccent);
})();

document.addEventListener('DOMContentLoaded', () => {
  I18N.init();
  const themeBtn = document.getElementById('btn-theme');
  const accentBtn = document.getElementById('btn-accent');
  if (themeBtn) {
    themeBtn.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('imgshift-theme', next);
      I18N.updateThemeButtons();
    });
  }
  if (accentBtn) {
    accentBtn.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-accent') || 'cyan';
      const next = cur === 'cyan' ? 'magenta' : 'cyan';
      document.documentElement.setAttribute('data-accent', next);
      localStorage.setItem('imgshift-accent', next);
      I18N.updateThemeButtons();
    });
  }
  const sel = document.getElementById('lang-select');
  if (sel) {
    sel.addEventListener('change', () => I18N.setLang(sel.value));
  }
  const cookieBanner = document.getElementById('cookie-banner');
  const cookieAccept = document.getElementById('cookie-accept');
  if (cookieBanner && cookieAccept) {
    if (!localStorage.getItem('imgshift-cookie-consent')) {
      cookieBanner.classList.add('visible');
    }
    cookieAccept.addEventListener('click', () => {
      localStorage.setItem('imgshift-cookie-consent', 'true');
      cookieBanner.classList.remove('visible');
    });
  }
});
</script>
